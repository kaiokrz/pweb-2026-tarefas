{% extends 'blog/base.html' %}
{% block content %}
    <h1>Últimos Posts</h1>
    {% for post in postagis %}
            <h2>{{ post.titulo }}</h2>
            <img src="{{ post.foto.url }}" alt="img post {{post.nome}}">
            <h3><a href="{% url 'post' post.id %}">Confira</a></h3>
            <h3>{{ post.data|date:"d/m/Y" }}</h3>
        <hr>
    {% endfor %}
{% endblock %}
